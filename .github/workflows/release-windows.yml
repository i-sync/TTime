name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # GHA runners pre-set VCINSTALLDIR for VS 2026 without VSCMD_VER, which
      # breaks node-gyp 8.x. Clear it so detection uses the VS setup module.
      VCINSTALLDIR: ''
      VCToolsInstallDir: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version ($tag) does not match package.json (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Install dependencies
        shell: pwsh
        run: |
          Remove-Item Env:VCINSTALLDIR -ErrorAction SilentlyContinue
          Remove-Item Env:VCToolsInstallDir -ErrorAction SilentlyContinue
          npm install --ignore-scripts
          npx electron-builder install-app-deps
          npm run modules-update

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Build Windows portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win:portable

      - name: List build artifacts
        shell: bash
        run: ls -la dist/

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true

      - name: Publish pre-release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: TTime v${{ steps.version.outputs.version }} (CI #${{ github.run_number }})
          prerelease: true
          files: dist/*.exe
          body: |
            手动触发的 Windows 测试包（Pre-release）。

            产物：
            - `TTime-*-setup.exe` — 安装版
            - 便携版 `.exe`

            包含 Phase 1–3 改造。安装后可在 **设置 → 高级** 配置划词/剪贴板/Round-trip 开关。
